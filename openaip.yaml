openapi: 3.1.0
info:
  title: Korean Law Action Wrapper
  version: 2.0.0
  description: |
    대한민국 법령 조회용 API입니다.

    ## 일반 법령 조회
    1. /law/search로 mst(법령일련번호) 확보
    2. /law/text로 조문 본문 조회 (jo는 '제4조', '4' 모두 허용)

    ## 자치법규(조례/규칙)
    1. /law/ordinance/search로 ordinSeq 확보
    2. /law/ordinance/text로 조문 조회

    ## 판례
    1. /law/precedent/search로 판례일련번호(id) 확보
    2. /law/precedent/text로 전문 조회

    ## 법령 연혁
    - /law/history로 법령명의 개정 이력 조회

    ## 응답 형식
    모든 엔드포인트는 { success: boolean, text: string } 또는 기존 구조화 응답을 반환합니다.
    text 필드에 사람이 읽을 수 있는 전체 내용이 담겨 있으면 그대로 사용자에게 보여주세요.

servers:
  - url: https://law-gpt-action-production.up.railway.app
    description: 배포 서버

paths:
  /law/search:
    post:
      operationId: searchLaw
      summary: 법령명 검색 (mst 확보용)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: "검색할 법령명 (예: 학원법)"
              required: [query]
      responses:
        "200":
          description: 검색 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        lawName: { type: string }
                        mst: { type: string }
                        lawId: { type: string }

  /law/text:
    post:
      operationId: getLawText
      summary: 특정 조문 본문 조회 (jo 생략 시 목차 반환)
      description: |
        mst와 조문번호(jo)로 해당 법령 조문을 가져옵니다.
        - jo를 지정하면 해당 조문 원문을 반환합니다.
        - jo를 생략하면 전체 조문 목차(제X조 제목 목록)를 반환합니다. 어떤 조문을 봐야 할지 모를 때 먼저 jo 없이 호출하여 목차를 확인하세요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mst:
                  type: string
                  description: "법령일련번호 (searchLaw에서 얻은 값)"
                jo:
                  type: string
                  description: "조문 번호. '제4조', '제4조의2', '4', '4의2' 등 자유형식 모두 허용. 생략 시 목차 반환."
              required: [mst]
      responses:
        "200":
          description: 조문 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  text: { type: string, description: "조문 원문 전체 텍스트. 이 필드의 내용을 그대로 사용자에게 보여주세요." }

  /law/ordinance/search:
    post:
      operationId: searchOrdinance
      summary: 자치법규(조례/규칙) 검색
      description: "시/군/구 조례, 규칙 등 자치법규를 검색합니다. ordinSeq를 획득해 /law/ordinance/text로 조문을 조회하세요."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: "검색어 (예: '서울시 학원 조례', '광진구 주차')"
                display:
                  type: integer
                  description: "결과 수 (기본 20)"
              required: [query]
      responses:
        "200":
          description: 검색 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  text: { type: string, description: "검색 결과 (ordinSeq 포함)" }

  /law/ordinance/text:
    post:
      operationId: getOrdinanceText
      summary: 자치법규 조문 조회
      description: "ordinSeq로 자치법규 본문을 조회합니다. jo를 지정하면 해당 조문만 반환합니다."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ordinSeq:
                  type: string
                  description: "자치법규 일련번호 (searchOrdinance에서 획득)"
                jo:
                  type: string
                  description: "조문 번호 (예: '제20조', '20'). 생략 시 전체 목차 반환"
              required: [ordinSeq]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  text: { type: string }

  /law/precedent/search:
    post:
      operationId: searchPrecedents
      summary: 판례 검색
      description: "대법원·고등법원 등 판례를 검색합니다. id를 획득해 /law/precedent/text로 전문을 조회하세요."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: "검색 키워드 (예: '음주운전', '해고 정당성')"
                court:
                  type: string
                  description: "법원 필터 (예: '대법원', '서울고등법원')"
                display:
                  type: integer
                  description: "결과 수 (기본 20, 최대 100)"
                page:
                  type: integer
                  description: "페이지 번호 (기본 1)"
              required: [query]
      responses:
        "200":
          description: 검색 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  text: { type: string, description: "판례 목록 (판례일련번호 id 포함)" }

  /law/precedent/text:
    post:
      operationId: getPrecedentText
      summary: 판례 전문 조회
      description: "판례일련번호(id)로 판례 전문(판시사항, 판결요지, 전문)을 조회합니다."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: "판례일련번호 (searchPrecedents 결과에서 획득)"
              required: [id]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  text: { type: string }

  /law/annex:
    post:
      operationId: getLawAnnex
      summary: 별표·서식 조회
      description: |
        법령의 별표·서식 목록 또는 특정 별표 내용을 조회합니다.
        - lawName만 지정하면 해당 법령의 별표·서식 목록을 반환합니다.
        - annexNo를 함께 지정하면 해당 별표의 텍스트 내용을 추출하여 반환합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lawName:
                  type: string
                  description: "법령명 (예: '학원법 시행규칙', '건축법 시행규칙')"
                knd:
                  type: string
                  enum: ["1", "2", "3", "4", "5"]
                  description: "1=별표, 2=서식, 3=부칙별표, 4=부칙서식, 5=전체 (생략 시 전체)"
                annexNo:
                  type: string
                  description: "별표 번호 (예: '4', '별표4'). 지정 시 해당 별표 내용 추출"
              required: [lawName]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  text: { type: string }

  /law/history:
    post:
      operationId: getLawHistory
      summary: 법령 연혁 조회
      description: "법령명으로 개정 이력(연혁)을 조회합니다. 각 버전의 mst를 확보하면 /law/history/text로 과거 조문도 조회 가능합니다."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lawName:
                  type: string
                  description: "법령명 (예: '학원법', '민법', '형법')"
                display:
                  type: integer
                  description: "결과 수 (기본 50)"
              required: [lawName]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  text: { type: string }

  /law/history/text:
    post:
      operationId: getHistoricalLawText
      summary: 과거 버전 조문 조회
      description: |
        특정 시점(MST)의 법령 조문을 조회합니다.
        - /law/history로 MST를 먼저 확보하세요.
        - jo를 지정하면 해당 조문만, 생략하면 전체 조문 목록을 반환합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mst:
                  type: string
                  description: "법령일련번호 (/law/history에서 획득)"
                jo:
                  type: string
                  description: "조문 번호 (예: '제38조', '38'). 생략 시 전체 목록 반환"
              required: [mst]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  text: { type: string }

  /law/article-history:
    post:
      operationId: getArticleHistory
      summary: 조문별 개정 이력 조회
      description: |
        특정 법령(또는 조문)의 개정 이력을 날짜 범위로 조회합니다.
        - fromRegDt ~ toRegDt 사이에 개정된 조문 목록을 반환합니다.
        - jo를 지정하면 해당 조문만 필터링합니다.
        - 결과의 MST로 /law/history/text를 호출하면 해당 시점 조문 원문을 볼 수 있습니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lawName:
                  type: string
                  description: "법령명 (예: '학원법', '민법'). lawId 대신 사용 가능"
                lawId:
                  type: string
                  description: "법령ID (lawName 대신 사용 가능)"
                jo:
                  type: string
                  description: "특정 조문 필터 (예: '제38조'). 생략 시 전체 조문"
                fromRegDt:
                  type: string
                  description: "조회 시작일 (YYYYMMDD, 예: '20150101')"
                toRegDt:
                  type: string
                  description: "조회 종료일 (YYYYMMDD, 예: '20201231')"
                page:
                  type: integer
                  description: "페이지 번호 (기본 1)"
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  text: { type: string, description: "개정 이력 목록 (공포일, 시행일, 변경사유, MST 포함)" }