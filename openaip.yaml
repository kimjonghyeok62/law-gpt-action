openapi: 3.1.0
info:
  title: Korean Law Action Wrapper
  version: 1.0.0
  description: |
    대한민국 법령 조회용 API입니다. 
    1. /law/search를 통해 법령의 mst(법령일련번호)를 먼저 찾습니다.
    2. 확인된 mst와 사용자가 요청한 조문번호(jo, 예: '제3조')를 사용하여 /law/text를 호출해 본문을 가져옵니다.
    3. 조문 내용이paragraphs 배열에 담겨오면 이를 순서대로 모두 사용자에게 보여주어야 합니다.

servers:
  - url: https://law-gpt-action-production.up.railway.app
    description: 배포 서버

paths:
  /law/search:
    post:
      operationId: searchLaw
      summary: 법령명 검색 (mst 확보용)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: "검색할 법령명 (예: 학원법)"
              required: [query]
      responses:
        "200":
          description: 검색 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        lawName: { type: string }
                        mst: { type: string }
                        lawId: { type: string }

  /law/text:
    post:
      operationId: getLawText
      summary: 특정 조문 본문 조회
      description: "mst와 조문번호(jo)를 사용하여 해당 법령의 구체적인 본문 내용을 가져옵니다."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mst:
                  type: string
                  description: "법령일련번호 (searchLaw에서 얻은 값)"
                jo:
                  type: string
                  description: "조회할 조문 번호. 한국어 표기('제4조', '제4조의2') 또는 숫자('4', '4의2') 모두 허용. 6자리 코드(000400)도 가능."
              required: [mst, jo]
      responses:
        "200":
          description: 조문 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  lawName: { type: string }
                  articleNumber: { type: string, description: "조회된 조문 번호" }
                  title: { type: string, description: "조문 제목" }
                  body: { type: string, description: "조문 전체 요약 텍스트" }
                  paragraphs:
                    type: array
                    description: "항, 호, 목으로 구성된 상세 본문 리스트"
                    items:
                      type: object
                      properties:
                        number: { type: string, description: "항/호 번호" }
                        text: { type: string, description: "해당 번호의 법령 내용" }
                  raw: { type: object, description: "서버 응답 원본" }