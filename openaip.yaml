openapi: 3.1.0
info:
  title: Korean Law Action Wrapper
  version: 2.0.0
  description: |
    대한민국 법령 조회용 API입니다.

    ## 일반 법령 조회
    1. /law/search로 mst(법령일련번호) 확보
    2. /law/text로 조문 본문 조회 (jo는 '제4조', '4' 모두 허용)

    ## 자치법규(조례/규칙)
    1. /law/ordinance/search로 ordinSeq 확보
    2. /law/ordinance/text로 조문 조회

    ## 판례
    1. /law/precedent/search로 판례일련번호(id) 확보
    2. /law/precedent/text로 전문 조회

    ## 법령 연혁
    - /law/history로 법령명의 개정 이력 조회

    ## 응답 형식
    모든 엔드포인트는 { success: boolean, text: string } 또는 기존 구조화 응답을 반환합니다.
    text 필드에 사람이 읽을 수 있는 전체 내용이 담겨 있으면 그대로 사용자에게 보여주세요.

servers:
  - url: https://law-gpt-action-production.up.railway.app
    description: 배포 서버

paths:
  /law/search:
    post:
      operationId: searchLaw
      summary: 법령명 검색 (mst 확보용)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: "검색할 법령명 (예: 학원법)"
              required: [query]
      responses:
        "200":
          description: 검색 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        lawName: { type: string }
                        mst: { type: string }
                        lawId: { type: string }

  /law/text:
    post:
      operationId: getLawText
      summary: 특정 조문 본문 조회
      description: "mst와 조문번호(jo)를 사용하여 해당 법령의 구체적인 본문 내용을 가져옵니다."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mst:
                  type: string
                  description: "법령일련번호 (searchLaw에서 얻은 값)"
                jo:
                  type: string
                  description: "조회할 조문 번호. 한국어 표기('제4조', '제4조의2') 또는 숫자('4', '4의2') 모두 허용. 6자리 코드(000400)도 가능."
              required: [mst, jo]
      responses:
        "200":
          description: 조문 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  lawName: { type: string }
                  articleNumber: { type: string, description: "조회된 조문 번호" }
                  title: { type: string, description: "조문 제목" }
                  body: { type: string, description: "조문 전체 요약 텍스트" }
                  paragraphs:
                    type: array
                    description: "항, 호, 목으로 구성된 상세 본문 리스트"
                    items:
                      type: object
                      properties:
                        number: { type: string, description: "항/호 번호" }
                        text: { type: string, description: "해당 번호의 법령 내용" }
                  raw: { type: object, description: "서버 응답 원본" }

  /law/ordinance/search:
    post:
      operationId: searchOrdinance
      summary: 자치법규(조례/규칙) 검색
      description: "시/군/구 조례, 규칙 등 자치법규를 검색합니다. ordinSeq를 획득해 /law/ordinance/text로 조문을 조회하세요."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: "검색어 (예: '서울시 학원 조례', '광진구 주차')"
                display:
                  type: integer
                  description: "결과 수 (기본 20)"
              required: [query]
      responses:
        "200":
          description: 검색 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  text: { type: string, description: "검색 결과 (ordinSeq 포함)" }

  /law/ordinance/text:
    post:
      operationId: getOrdinanceText
      summary: 자치법규 조문 조회
      description: "ordinSeq로 자치법규 본문을 조회합니다. jo를 지정하면 해당 조문만 반환합니다."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ordinSeq:
                  type: string
                  description: "자치법규 일련번호 (searchOrdinance에서 획득)"
                jo:
                  type: string
                  description: "조문 번호 (예: '제20조', '20'). 생략 시 전체 목차 반환"
              required: [ordinSeq]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  text: { type: string }

  /law/precedent/search:
    post:
      operationId: searchPrecedents
      summary: 판례 검색
      description: "대법원·고등법원 등 판례를 검색합니다. id를 획득해 /law/precedent/text로 전문을 조회하세요."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: "검색 키워드 (예: '음주운전', '해고 정당성')"
                court:
                  type: string
                  description: "법원 필터 (예: '대법원', '서울고등법원')"
                display:
                  type: integer
                  description: "결과 수 (기본 20, 최대 100)"
                page:
                  type: integer
                  description: "페이지 번호 (기본 1)"
              required: [query]
      responses:
        "200":
          description: 검색 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  text: { type: string, description: "판례 목록 (판례일련번호 id 포함)" }

  /law/precedent/text:
    post:
      operationId: getPrecedentText
      summary: 판례 전문 조회
      description: "판례일련번호(id)로 판례 전문(판시사항, 판결요지, 전문)을 조회합니다."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: "판례일련번호 (searchPrecedents 결과에서 획득)"
              required: [id]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  text: { type: string }

  /law/history:
    post:
      operationId: getLawHistory
      summary: 법령 연혁 조회
      description: "법령명으로 개정 이력(연혁)을 조회합니다. 각 버전의 mst를 확보하면 /law/text로 과거 조문도 조회 가능합니다."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lawName:
                  type: string
                  description: "법령명 (예: '학원법', '민법', '형법')"
                display:
                  type: integer
                  description: "결과 수 (기본 50)"
              required: [lawName]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  text: { type: string }